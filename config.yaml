# Jarvis Configuration
# Edit this file to personalize your assistant

user:
  name: "Arpan"
  timezone: "America/New_York"  # Used for greetings and alarm time display

voice:
  rate: 160          # words per minute (default macOS is ~175)
  voice: "Daniel"  # macOS voice name — run `say -v ?` in terminal to list all voices

weather:
  city: "Chicago"    # Your city name
  country_code: "US" # ISO country code
  units: "imperial"  # imperial = °F | metric = °C

alarms:
  morning:
    enabled: true
    hour: 4
    minute: 30
  evening:
    enabled: true
    hour: 20
    minute: 0

modules:
  greeting: true
  ram: true
  time: true
  weather: true
