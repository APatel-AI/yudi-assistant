# Jarvis Configuration
# Edit this file to personalize your assistant

user:
  name: "Arpan"

voice:
  rate: 175          # words per minute (default macOS is ~175)
  voice: "Samantha"  # macOS voice name — run `say -v ?` in terminal to list all voices

weather:
  city: "Chicago"    # Your city name
  country_code: "US" # ISO country code
  units: "imperial"  # imperial = °F | metric = °C

modules:
  greeting: true
  ram: true
  time: true
  weather: true
